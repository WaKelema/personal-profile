<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">My Profile</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarNav">

<ul class="navbar-nav ms-auto">

<li class="nav-item">

</li>

</li>

</ul>

</div>
</div>

<div class="container mt-5 form-container">

<div class="text-center mb-3">

<div class="profile-box">
<img src="profile.jpg" class="profile-img" alt="Profile Logo">
</div>

<h2 class="mb-4">Job Application Form</h2>

</div>

<form onsubmit="return validateForm()">

<fieldset class="p-4 border rounded">

<legend class="w-auto px-3">Personal Information</legend>

<div class="mb-3">
<label class="form-label"><i class="bi bi-person-fill"></i> Full Name</label>
<input type="text" class="form-control" id="fullname">
</div>

<div class="mb-3">
<label class="form-label"><i class="bi bi-envelope-fill"></i> Email Address</label>
<input type="email" class="form-control" id="email">
</div>

<div class="mb-3">
<label class="form-label"><i class="bi bi-telephone-fill"></i> Telephone Number</label>
<input type="text" class="form-control" id="telephone">
</div>

<div class="mb-3">
<label class="form-label"><i class="bi bi-house-fill"></i> Physical Address</label>
<input type="text" class="form-control">
</div>

</fieldset>


<br>


<fieldset class="p-4 border rounded">

<legend class="w-auto px-3">Position Information</legend>

<div class="mb-3">
<label class="form-label"><i class="bi bi-briefcase-fill"></i> Desired Job Title</label>

<select class="form-control">
<option>Software Developer</option>
<option>Web Designer</option>
<option>IT Support</option>
<option>Database Administrator</option>
</select>

</div>


<label class="form-label">Employment Type</label>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Part-time Permanent</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Contract</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="employment">
<label class="form-check-label">Full-time Permanent</label>
</div>

</fieldset>


<br>


<fieldset class="p-4 border rounded">

<legend class="w-auto px-3">Areas of Interest</legend>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Account Executive</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Business Development</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Inside Sales</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">Sales Manager</label>
</div>

<div class="form-check">
<input class="form-check-input interest" type="checkbox">
<label class="form-check-label">VP Sales</label>
</div>

</fieldset>


<br>


<fieldset class="p-4 border rounded">

<legend class="w-auto px-3">Relocation</legend>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">Yes</label>
</div>

<div class="form-check">
<input class="form-check-input" type="radio" name="relocate">
<label class="form-check-label">No</label>
</div>

</fieldset>


<br>


<div class="mb-3">

<label class="form-label"><i class="bi bi-chat-left-text-fill"></i> Why are you suitable for this role?</label>

<textarea class="form-control" rows="4"></textarea>

</div>


<div class="mb-5">

<button class="btn btn-primary">Submit</button>

<button type="reset" class="btn btn-secondary">Reset</button>

</div>


</form>

</div>


<footer class="footer text-center">

<p>© 2026 Mathews Kealeboga</p>

</footer>


<script>

function validateForm(){

let name = document.getElementById("fullname").value;
let email = document.getElementById("email").value;
let telephone = document.getElementById("telephone").value;

let interests = document.querySelectorAll(".interest:checked");

if(name === "" || email === "" || telephone === ""){
alert("Please complete all required fields.");
return false;
}

if(interests.length === 0){
alert("Please select at least one area of interest.");
return false;
}

return true;

}

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
